name: Update DAO data

on:
  schedule:
    - cron: '*/5 * * * *'    # 5分ごと
  workflow_dispatch:           # 手動実行も可

concurrency:
  group: update-dao-data
  cancel-in-progress: false   # 実行中のジョブを強制終了しない（完了を待つ）

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch DAO data from GAS
        id: fetch
        run: |
          HTTP_CODE=$(curl -sL \
            "https://script.google.com/macros/s/AKfycbxM2ybpJqfWLL-MPnOwZqeBdHjN6IQh5QB-_LubZAG-bD0x8jLkgbUn7NYRzYLFOPfj7g/exec?mode=json&t=$(date +%s)" \
            -o dao/data_new.json \
            --max-time 30 \
            --retry 3 \
            --retry-delay 5 \
            -w "%{http_code}")
          echo "http_code=$HTTP_CODE" >> $GITHUB_OUTPUT

      - name: Validate and stamp timestamp
        id: validate
        run: |
          python3 - <<'EOF'
          import json, time, sys

          with open('dao/data_new.json') as f:
              text = f.read()

          try:
              data = json.loads(text)
          except Exception as e:
              print(f'JSON parse error (GAS may be down): {e}')
              print(f'Response: {text[:200]}')
              sys.exit(0)   # GAS側エラーはワークフロー失敗にしない

          if not isinstance(data.get('proposals'), list):
              print('Invalid data structure (missing proposals array)')
              sys.exit(0)   # 同上

          data['_generatedMs'] = int(time.time() * 1000)

          with open('dao/data.json', 'w', encoding='utf-8') as f:
              json.dump(data, f, ensure_ascii=False)

          print(f"OK: {len(data['proposals'])} proposals")
          EOF

      - name: Commit and push if changed
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add dao/data.json
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m 'Auto-update DAO data [skip ci]'
            git pull --rebase origin main
            git push
          fi
