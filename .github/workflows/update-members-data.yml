name: Update members data

on:
  schedule:
    - cron: '*/5 * * * *'    # 5分ごと
  workflow_dispatch:           # 手動実行も可

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch members data from GAS
        run: |
          curl -sL \
            "https://script.google.com/macros/s/AKfycbxQ7gBHJQFVZEXcyisJdiL7xa64RcKzYjzBZLEGlkelSvxXCfPPHTW5eAVHB09aue1p/exec?mode=json&t=$(date +%s)" \
            -o members/rows_new.json \
            --max-time 30 \
            --retry 3 \
            --retry-delay 5

      - name: Validate and stamp timestamp
        run: |
          python3 - <<'EOF'
          import json, time, sys

          with open('members/rows_new.json') as f:
              text = f.read()

          try:
              rows = json.loads(text)
          except Exception as e:
              print(f'JSON parse error: {e}')
              print(f'Response: {text[:200]}')
              sys.exit(1)

          if not isinstance(rows, list):
              print('Invalid data structure (expected array)')
              sys.exit(1)

          data = {
              'rows': rows,
              '_generatedMs': int(time.time() * 1000)
          }

          with open('members/data.json', 'w', encoding='utf-8') as f:
              json.dump(data, f, ensure_ascii=False)

          print(f"OK: {len(rows)} members")
          EOF

      - name: Cleanup temp file
        run: rm -f members/rows_new.json

      - name: Commit and push if changed
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add members/data.json
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m 'Auto-update members data [skip ci]'
            git pull --rebase origin main
            git push
          fi
