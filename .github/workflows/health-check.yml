name: Health check

on:
  schedule:
    - cron: '0 1 * * *'    # 毎日 JST 10:00
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      actions: read

    env:
      GAS_TOPICS:  "https://script.google.com/macros/s/AKfycbycw2FBvcm34mS9R8SUNg28KscGqqGjR1zjz3hnLYq8ckgKCZObYaC9kbMs8R2SGXgC/exec"
      GAS_DAO:     "https://script.google.com/macros/s/AKfycbxM2ybpJqfWLL-MPnOwZqeBdHjN6IQh5QB-_LubZAG-bD0x8jLkgbUn7NYRzYLFOPfj7g/exec"
      GAS_MEMBERS: "https://script.google.com/macros/s/AKfycbyRVO7fLJx62HS6W3M2_bmPIP9y6stpiVJFM429NMKXzlV24_wGx97xms22QLb1VHsX/exec"
      PAGES_BASE:  "https://you0810jmsdf.github.io/cocola-site"

    steps:
      # ── GAS エンドポイント疎通確認 ──────────────────────────────────────
      - name: Fetch topics GAS (health mode)
        run: |
          curl -sL "$GAS_TOPICS?mode=health" \
            -o topics_health.json --max-time 30 --retry 2 --retry-delay 5 || echo '{}' > topics_health.json

      - name: Fetch DAO GAS (json mode)
        run: |
          curl -sL "$GAS_DAO?mode=json&t=$(date +%s)" \
            -o dao_gas.json --max-time 30 --retry 2 --retry-delay 5 || echo '{}' > dao_gas.json

      - name: Fetch members GAS (json mode)
        run: |
          curl -sL "$GAS_MEMBERS?mode=json&t=$(date +%s)" \
            -o members_gas.json --max-time 30 --retry 2 --retry-delay 5 || echo '{}' > members_gas.json

      # ── GitHub Pages data.json 鮮度確認 ─────────────────────────────────
      - name: Fetch published data.json files
        run: |
          curl -sL "$PAGES_BASE/dao/data.json"     -o dao_pages.json     --max-time 15 || echo '{}' > dao_pages.json
          curl -sL "$PAGES_BASE/members/data.json" -o members_pages.json --max-time 15 || echo '{}' > members_pages.json
          curl -sL "$PAGES_BASE/events/data.json"  -o events_pages.json  --max-time 15 || echo '{}' > events_pages.json

      # ── GitHub Actions 実行履歴取得 ─────────────────────────────────────
      - name: Fetch workflow run history
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh run list --workflow=update-dao-data.yml     --limit=10 --json createdAt,conclusion,status > runs_dao.json
          gh run list --workflow=update-members-data.yml --limit=10 --json createdAt,conclusion,status > runs_members.json
          gh run list --workflow=update-events-data.yml  --limit=10 --json createdAt,conclusion,status > runs_events.json

      # ── 集計・判定 ───────────────────────────────────────────────────────
      - name: Aggregate and judge
        id: aggregate
        run: |
          python3 - <<'EOF'
          import json, time, os, sys
          from datetime import datetime, timezone

          now_ms      = int(time.time() * 1000)
          now_dt      = datetime.now(timezone.utc)
          FRESH_MS    = 30 * 60 * 1000   # 30分
          RUNS_MAX_MIN = 30              # ワークフロー最終成功が30分超 → 異常
          results     = {}

          # ── topics GAS: health エンドポイントの ok フラグを見る ──────────
          try:
              th = json.loads(open('topics_health.json').read())
              if not th.get('ok', False):
                  failed = [k for k, v in th.get('checks', {}).items() if not v.get('ok')]
                  results['GAS[topics]'] = (False, f"異常項目: {failed}")
              else:
                  results['GAS[topics]'] = (True, 'OK')
          except Exception as e:
              results['GAS[topics]'] = (False, f"parse error: {e}")

          # ── DAO GAS: proposals 配列が存在するか ──────────────────────────
          try:
              d = json.loads(open('dao_gas.json').read())
              if not isinstance(d.get('proposals'), list):
                  results['GAS[dao]'] = (False, 'proposals キーなし or 配列でない')
              else:
                  results['GAS[dao]'] = (True, f"{len(d['proposals'])}件")
          except Exception as e:
              results['GAS[dao]'] = (False, f"parse error: {e}")

          # ── members GAS: rows 配列が存在するか ───────────────────────────
          try:
              d = json.loads(open('members_gas.json').read())
              if not isinstance(d.get('rows'), list):
                  results['GAS[members]'] = (False, 'rows キーなし or 配列でない')
              else:
                  results['GAS[members]'] = (True, f"{len(d['rows'])}名")
          except Exception as e:
              results['GAS[members]'] = (False, f"parse error: {e}")

          # ── GitHub Actions 実行履歴チェック ─────────────────────────────────
          workflow_runs = [
              ('Actions[update-dao]',     'runs_dao.json'),
              ('Actions[update-members]', 'runs_members.json'),
              ('Actions[update-events]',  'runs_events.json'),
          ]
          for label, fname in workflow_runs:
              try:
                  runs = json.loads(open(fname).read())
                  success_runs = [r for r in runs if r.get('conclusion') == 'success']
                  if not success_runs:
                      results[label] = (False, '直近10件に成功実行なし（ワークフロー停止の可能性）')
                  else:
                      last_ok = success_runs[0]
                      created = last_ok['createdAt']  # ISO 8601 例: "2026-05-01T10:00:00Z"
                      last_dt = datetime.fromisoformat(created.replace('Z', '+00:00'))
                      age_min = (now_dt - last_dt).total_seconds() / 60
                      if age_min > RUNS_MAX_MIN:
                          results[label] = (False, f"最終成功: {age_min:.0f}分前（{RUNS_MAX_MIN}分超過）")
                      else:
                          results[label] = (True, f"最終成功: {age_min:.0f}分前")
              except Exception as e:
                  results[label] = (False, f"実行履歴取得失敗: {e}")

          # ── data.json 鮮度チェック ────────────────────────────────────────
          for label, fname in [
              ('data.json[dao]',     'dao_pages.json'),
              ('data.json[members]', 'members_pages.json'),
              ('data.json[events]',  'events_pages.json'),
          ]:
              try:
                  d = json.loads(open(fname).read())
                  ms = d.get('_generatedMs', 0)
                  age = now_ms - ms
                  age_min = age / 60000
                  if age > FRESH_MS:
                      results[label] = (False, f"{age_min:.0f}分前が最新（30分超過）")
                  else:
                      results[label] = (True, f"{age_min:.0f}分前に更新済み")
              except Exception as e:
                  results[label] = (False, f"取得失敗: {e}")

          # ── 結果出力 ─────────────────────────────────────────────────────
          all_ok = all(ok for ok, _ in results.values())
          lines  = []
          for name, (ok, msg) in results.items():
              mark = '✅' if ok else '❌'
              lines.append(f"{mark} **{name}**: {msg}")
              print(f"{mark} {name}: {msg}")

          jst = time.strftime('%Y-%m-%d %H:%M UTC', time.gmtime())
          body = '\n'.join(lines) + f'\n\n_チェック日時: {jst}_'

          open('health_body.txt', 'w').write(body)

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"all_ok={'true' if all_ok else 'false'}\n")

          if not all_ok:
              failed = [n for n, (ok, _) in results.items() if not ok]
              print(f"\n❌ 異常あり: {failed}")
          else:
              print('\n✅ 全項目正常')
          EOF

      # ── 異常時: Issue 作成 or 既存 Issue にコメント追加 ──────────────────
      - name: Report failure via GitHub Issue
        if: steps.aggregate.outputs.all_ok == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LABEL="auto-monitor"
          TITLE="[自動監視] COCoLa サイト異常検知"
          BODY=$(cat health_body.txt)

          gh label create "$LABEL" --color "d93f0b" --description "自動監視アラート" --force 2>/dev/null || true

          EXISTING=$(gh issue list --label "$LABEL" --state open --json number --jq '.[0].number // ""')
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body "$BODY"
            echo "Issue #$EXISTING に追記しました"
          else
            gh issue create --title "$TITLE" --body "$BODY" --label "$LABEL"
            echo "新規 Issue を作成しました"
          fi

      # ── 正常時: 未解決 Issue があれば自動クローズ ────────────────────────
      - name: Auto-close resolved Issue
        if: steps.aggregate.outputs.all_ok == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LABEL="auto-monitor"
          EXISTING=$(gh issue list --label "$LABEL" --state open --json number --jq '.[0].number // ""')
          if [ -n "$EXISTING" ]; then
            gh issue close "$EXISTING" --comment "✅ 全項目正常に復旧しました（自動クローズ）"
            echo "Issue #$EXISTING をクローズしました"
          fi
