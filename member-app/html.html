<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COCoLa メンバー紹介</title>
<style>
:root {
  --green: #1d9e75;
  --green-dark: #0f6e56;
  --blue: #1fa7c9;
  --orange: #ef7f4d;
  --yellow: #f2b134;
  --violet: #6d79d8;
  --pink: #e56b8f;
  --bg: #f7faf8;
  --surface: rgba(255, 255, 255, 0.94);
  --surface-strong: #ffffff;
  --border: rgba(29, 158, 117, 0.12);
  --text: #183128;
  --muted: #607068;
  --shadow: 0 18px 42px rgba(29, 158, 117, 0.10);
  --radius-xl: 28px;
  --radius-lg: 22px;
  --radius-md: 16px;
  --radius-pill: 999px;
}

*,
*::before,
*::after {
  box-sizing: border-box;
}

html,
body {
  margin: 0;
  min-height: 100%;
  background:
    radial-gradient(circle at top left, rgba(29, 158, 117, 0.15), transparent 28%),
    radial-gradient(circle at top right, rgba(109, 121, 216, 0.12), transparent 24%),
    radial-gradient(circle at 75% 70%, rgba(239, 127, 77, 0.10), transparent 26%),
    linear-gradient(180deg, #fbfefd 0%, var(--bg) 100%);
  color: var(--text);
  font-family: "Meiryo", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
  line-height: 1.75;
  letter-spacing: 0.02em;
}

body {
  padding: 24px;
}

a {
  color: inherit;
}

.page-shell {
  max-width: 1280px;
  margin: 0 auto;
}

.site-header,
.intro,
.toolbar,
.card,
.modal,
.join-wrap {
  border: 1px solid var(--border);
  background: var(--surface);
  box-shadow: var(--shadow);
}

.site-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  padding: 14px 20px;
  border-radius: 24px;
  background: rgba(255, 255, 255, 0.74);
  backdrop-filter: blur(14px);
}

.brand {
  display: inline-flex;
  align-items: center;
  gap: 14px;
}

.brand-mark {
  width: 54px;
  height: 54px;
  border-radius: 18px;
  display: grid;
  place-items: center;
  color: #fff;
  font-size: 1.6rem;
  font-weight: 700;
  background: linear-gradient(135deg, var(--green), var(--blue));
  box-shadow: 0 12px 28px rgba(29, 158, 117, 0.20);
}

.brand h1 {
  margin: 0;
  font-size: 1.15rem;
}

.brand p {
  margin: 2px 0 0;
  color: var(--muted);
  font-size: 0.86rem;
}

.header-link {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 44px;
  padding: 0 18px;
  border-radius: var(--radius-pill);
  background: #fff;
  color: var(--green-dark);
  border: 1px solid rgba(29, 158, 117, 0.18);
  text-decoration: none;
  font-weight: 700;
}

.header-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.intro {
  margin-top: 18px;
  padding: 28px;
  border-radius: var(--radius-xl);
  position: relative;
  overflow: hidden;
}

.intro::after {
  content: "";
  position: absolute;
  right: -80px;
  bottom: -120px;
  width: 300px;
  height: 300px;
  background:
    radial-gradient(circle, rgba(29, 158, 117, 0.14), transparent 46%),
    radial-gradient(circle at 32% 30%, rgba(239, 127, 77, 0.15), transparent 42%);
  pointer-events: none;
}

.eyebrow {
  margin: 0 0 8px;
  color: var(--green-dark);
  font-size: 0.78rem;
  font-weight: 700;
  letter-spacing: 0.16em;
  text-transform: uppercase;
}

.intro h2 {
  margin: 0;
  font-size: clamp(1.9rem, 3vw, 2.8rem);
  line-height: 1.25;
}

.intro p {
  max-width: 760px;
  margin: 14px 0 0;
  color: var(--muted);
}

.toolbar {
  margin-top: 18px;
  padding: 16px 18px;
  border-radius: 24px;
}

.toolbar-row {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  align-items: center;
}

.chips {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  flex: 1;
  min-width: 280px;
}

.chip {
  padding: 7px 14px;
  border-radius: var(--radius-pill);
  border: 1px solid rgba(29, 158, 117, 0.14);
  background: #fff;
  color: var(--muted);
  font-size: 0.84rem;
  font-weight: 700;
  cursor: pointer;
  user-select: none;
  transition: transform 180ms ease, border-color 180ms ease, color 180ms ease, background 180ms ease;
}

.chip:hover,
.chip.active {
  color: #fff;
  background: linear-gradient(135deg, var(--green), var(--blue));
  border-color: transparent;
  transform: translateY(-1px);
}

.search-box {
  display: flex;
  align-items: center;
  gap: 8px;
  min-width: min(100%, 280px);
  padding: 9px 14px;
  border: 1px solid rgba(29, 158, 117, 0.14);
  border-radius: var(--radius-pill);
  background: rgba(255, 255, 255, 0.92);
}

.search-box input {
  width: 100%;
  border: none;
  outline: none;
  background: transparent;
  color: var(--text);
  font: inherit;
}

.meta-row {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  align-items: center;
  justify-content: space-between;
  margin-top: 14px;
}

.meta {
  font-size: 0.86rem;
  color: var(--muted);
}

.mail-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 44px;
  padding: 0 16px;
  border-radius: var(--radius-pill);
  border: 1px solid rgba(29, 158, 117, 0.18);
  background: #fff;
  color: var(--green-dark);
  font-weight: 700;
  cursor: pointer;
}

.err-banner {
  display: none;
  margin-top: 14px;
  padding: 12px 14px;
  border-radius: 16px;
  background: rgba(239, 127, 77, 0.10);
  border: 1px solid rgba(239, 127, 77, 0.18);
  color: #9f4b24;
  font-size: 0.88rem;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px;
  margin-top: 18px;
}

.card {
  display: grid;
  gap: 12px;
  padding: 18px;
  border-radius: var(--radius-lg);
  cursor: pointer;
  transition: transform 180ms ease, box-shadow 180ms ease, border-color 180ms ease;
}

.card:hover {
  transform: translateY(-2px);
  border-color: rgba(29, 158, 117, 0.26);
  box-shadow: 0 18px 36px rgba(29, 158, 117, 0.14);
}

.card-top {
  display: grid;
  grid-template-columns: 64px minmax(0, 1fr);
  gap: 12px;
  align-items: center;
}

.avatar,
.modal-avatar {
  overflow: hidden;
  border-radius: 50%;
  background: #edf4f0;
  border: 1px solid rgba(29, 158, 117, 0.12);
}

.avatar {
  width: 64px;
  height: 64px;
}

.modal-avatar {
  width: 88px;
  height: 88px;
}

.avatar img,
.modal-avatar img {
  display: block;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.card-name {
  font-size: 1rem;
  font-weight: 700;
}

.card-sub {
  margin-top: 3px;
  color: var(--muted);
  font-size: 0.84rem;
  line-height: 1.55;
}

.tags,
.modal-tags,
.card-links,
.modal-links,
.member-banners {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.tags {
  align-items: flex-start;
  min-height: 70px;
  align-content: flex-start;
}

.tag,
.lbtn,
.modal-links a,
.member-banner {
  border-radius: var(--radius-pill);
  font-size: 0.76rem;
}

.tag {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 32px;
  padding: 0 10px;
  border: 1px solid rgba(24, 49, 40, 0.72);
  font-weight: 700;
  line-height: 1.2;
  white-space: nowrap;
  text-align: center;
}

.tc-mono { background: #e1f5ee; color: #0f6e56; }
.tc-machi { background: #e6f1fb; color: #185fa5; }
.tc-tsuna { background: #eeedfe; color: #534ab7; }
.tc-shoku { background: #faeeda; color: #854f0b; }
.tc-jibun { background: #faece7; color: #993c1d; }
.tc-tomo { background: #fbeaf0; color: #993556; }

.member-banners {
  margin-top: 2px;
}

.member-banner {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 11px;
  font-weight: 700;
  line-height: 1.4;
  border-radius: 12px;
  border: 1px solid transparent;
  text-decoration: none;
}

.member-banner__label {
  opacity: 0.8;
  font-size: 0.7rem;
}

.member-banner__icon {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 1.1rem;
  height: 1.1rem;
  border-radius: 4px;
  font-size: 0.72rem;
  font-weight: 700;
  background: rgba(255, 255, 255, 0.75);
}

.member-banner--group {
  background: rgba(31, 167, 201, 0.12);
  color: #0d738c;
  border-color: rgba(31, 167, 201, 0.18);
}

.member-banner--role {
  background: rgba(242, 177, 52, 0.16);
  color: #8b5a00;
  border-color: rgba(242, 177, 52, 0.28);
}

.member-banner--academy {
  background: rgba(229, 107, 143, 0.12);
  color: #a13f62;
  border-color: rgba(229, 107, 143, 0.18);
}

.card-bio {
  margin: 0;
  color: #486057;
  font-size: 0.88rem;
  line-height: 1.7;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.card-links,
.modal-links {
  margin-top: 2px;
}

.lbtn,
.modal-links a {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 32px;
  padding: 0 12px;
  border: 1px solid rgba(29, 158, 117, 0.12);
  background: #fff;
  color: var(--muted);
  text-decoration: none;
}

.empty,
.loading {
  padding: 42px 18px;
  border-radius: var(--radius-lg);
  border: 1px dashed rgba(29, 158, 117, 0.16);
  text-align: center;
  color: var(--muted);
}

.join-wrap {
  margin-top: 20px;
  padding: 22px;
  border-radius: var(--radius-xl);
  text-align: center;
}

.join-wrap h3 {
  margin: 0;
  font-size: 1.2rem;
}

.join-wrap p {
  margin: 8px auto 16px;
  max-width: 560px;
  color: var(--muted);
}

.join-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 48px;
  padding: 0 22px;
  border-radius: var(--radius-pill);
  background: linear-gradient(135deg, var(--green), var(--blue));
  color: #fff;
  text-decoration: none;
  font-weight: 700;
  box-shadow: 0 14px 28px rgba(29, 158, 117, 0.22);
}

.modal-bg {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 1000;
  padding: 18px;
  background: rgba(21, 42, 34, 0.36);
  backdrop-filter: blur(6px);
}

.modal-bg.open {
  display: flex;
  align-items: flex-start;
  justify-content: center;
  overflow-y: auto;
}

.modal {
  width: min(100%, 640px);
  margin: auto;
  padding: 24px;
  border-radius: 26px;
  position: relative;
}

.modal-close {
  position: absolute;
  top: 12px;
  right: 12px;
  width: 34px;
  height: 34px;
  border: none;
  border-radius: 50%;
  background: rgba(29, 158, 117, 0.08);
  color: var(--muted);
  cursor: pointer;
  font-size: 1rem;
}

.modal-top {
  display: grid;
  grid-template-columns: 88px minmax(0, 1fr);
  gap: 16px;
  align-items: center;
  margin-bottom: 12px;
}

.modal-name {
  font-size: 1.24rem;
  font-weight: 700;
}

.modal-sub {
  margin-top: 4px;
  color: var(--muted);
  font-size: 0.92rem;
}

.modal-section {
  margin-top: 16px;
}

.modal-section-title {
  margin: 0 0 6px;
  color: var(--green-dark);
  font-size: 0.76rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

.modal-text {
  margin: 0;
  color: #42594f;
  white-space: pre-wrap;
}

.mail-toast {
  display: none;
  position: fixed;
  left: 50%;
  bottom: 22px;
  transform: translateX(-50%);
  z-index: 1100;
  padding: 11px 18px;
  border-radius: var(--radius-pill);
  background: linear-gradient(135deg, var(--green), var(--blue));
  color: #fff;
  font-weight: 700;
  box-shadow: 0 14px 28px rgba(29, 158, 117, 0.24);
}

.mail-toast.show {
  display: block;
}

@media (max-width: 860px) {
  body {
    padding: 16px;
  }

  .site-header {
    flex-direction: column;
    align-items: flex-start;
  }

  .toolbar-row,
  .meta-row {
    flex-direction: column;
    align-items: stretch;
  }

  .chips,
  .search-box {
    min-width: 0;
  }
}

@media (max-width: 560px) {
  .intro,
  .toolbar,
  .card,
  .join-wrap,
  .modal {
    padding: 18px;
  }

  .intro h2 {
    font-size: 1.65rem;
  }

  .grid {
    grid-template-columns: 1fr;
  }

  .modal-top,
  .card-top {
    grid-template-columns: 1fr;
  }
}
</style>
</head>
<body>
<div class="page-shell">
  <header class="site-header">
    <div class="brand">
      <div class="brand-mark">C</div>
      <div>
        <h1>COCoLaメンバーの紹介</h1>
        <p>ひとりひとりの「やりたい」と、地域でのつながりを見つけるページです。</p>
      </div>
    </div>
    <div class="header-actions">
      <a class="header-link" href="https://you0810jmsdf.github.io/cocola-site/index.html" rel="noopener">COCoLaトップへ戻る</a>
      <a class="header-link" href="https://docs.google.com/forms/d/1V_0080ht4b7iBG4kpckyWhqYmwNVtQkbSStas7fAeGs/viewform" target="_blank" rel="noopener">参加フォームへ</a>
    </div>
  </header>

  <section class="intro">
    <p class="eyebrow">Member Directory</p>
    <h2>一人ひとりの個性が、<br>COCoLaの活動をつくっている。</h2>
    <p>
      ものづくり、まちづくり、つながりづくり。COCoLaに関わるメンバーの得意なことや思い、
      そして地域でのつながりを一覧で見られます。
    </p>
  </section>

  <section class="toolbar">
    <div class="toolbar-row">
      <div class="chips" id="chipList">
        <button class="chip active" data-cat="all" type="button">すべて</button>
        <button class="chip" data-cat="ものをつくる" type="button">ものをつくる</button>
        <button class="chip" data-cat="まちをつくる" type="button">まちをつくる</button>
        <button class="chip" data-cat="つながりをつくる" type="button">つながりをつくる</button>
        <button class="chip" data-cat="食をつくる" type="button">食をつくる</button>
        <button class="chip" data-cat="自分をつくる" type="button">自分をつくる</button>
        <button class="chip" data-cat="ともにつくる" type="button">ともにつくる</button>
      </div>
      <label class="search-box">
        <span>検索</span>
        <input type="text" id="search" placeholder="名前・スキル・所属団体で検索">
      </label>
    </div>
    <div class="meta-row">
      <p class="meta" id="meta">読み込み中...</p>
      <button class="mail-btn" id="mailBtn" type="button">メーリングリストをコピー</button>
    </div>
    <div class="err-banner" id="err-banner"></div>
  </section>

  <main>
    <div class="grid" id="grid">
      <div class="loading">メンバー情報を読み込んでいます...</div>
    </div>
  </main>

  <section class="join-wrap">
    <h3>COCoLaに参加する</h3>
    <p>活動に加わりたい方も、まずは話を聞いてみたい方も、フォームから気軽にご連絡ください。</p>
    <a class="join-btn" href="https://docs.google.com/forms/d/1V_0080ht4b7iBG4kpckyWhqYmwNVtQkbSStas7fAeGs/viewform" target="_blank" rel="noopener">入会・情報修正フォームへ</a>
  </section>
</div>

<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <button class="modal-close" id="modal-close" type="button">×</button>
    <div id="modal-content"></div>
  </div>
</div>

<div class="mail-toast" id="mail-toast">コピーしました</div>

<script>
const APP_URL = 'https://script.google.com/macros/s/AKfycbxQ7gBHJQFVZEXcyisJdiL7xa64RcKzYjzBZLEGlkelSvxXCfPPHTW5eAVHB09aue1p/exec';
const STATIC_JSON_URL = '../members/data.json';
const STATIC_MAX_AGE_MS = 5 * 60 * 1000;

const COL = {
  timestamp: 0,
  emailForm: 1,
  purpose: 2,
  nickname: 3,
  name: 4,
  job: 5,
  photo: 6,
  emailPublic: 7,
  sns1: 8,
  sns2: 9,
  url1: 10,
  url2: 11,
  license: 12,
  skills: 13,
  goals: 14,
  comment: 15,
  cats: 16,
  academyBatch: 17,
  otherGroups: 18,
  otherGroupUrl1: 19,
  otherGroup2: 20,
  otherGroupUrl2: 21,
  internalRole: 22,
};

const TAG_CLASS = {
  "ものをつくる": "tc-mono",
  "まちをつくる": "tc-machi",
  "つながりをつくる": "tc-tsuna",
  "食をつくる": "tc-shoku",
  "自分をつくる": "tc-jibun",
  "ともにつくる": "tc-tomo",
};

const SIL = `
  <svg viewBox="0 0 80 80" width="80" height="80" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <rect width="80" height="80" rx="40" fill="#edf4f0"></rect>
    <circle cx="40" cy="28" r="14" fill="#c6d8ce"></circle>
    <path d="M15 67c3-13 13-22 25-22s22 9 25 22" fill="#c6d8ce"></path>
  </svg>
`;

let allMembers = [];
let activeCat = "all";

function toImgUrl(raw) {
  if (!raw) return "";
  const value = String(raw).trim();
  let id = "";
  const patterns = [/\/file\/d\/([^/?&]+)/, /[?&]id=([^&]+)/, /\/d\/([^/?&]+)/];
  patterns.some((pattern) => {
    const match = value.match(pattern);
    if (!match) return false;
    id = match[1];
    return true;
  });
  return id ? "https://drive.google.com/thumbnail?id=" + id + "&sz=w400" : value;
}

function avatarHTML(photo, sizeClass) {
  const url = toImgUrl(photo);
  if (!url) return '<div class="' + sizeClass + '">' + SIL + '</div>';
  return '<div class="' + sizeClass + '"><img src="' + esc(url) + '" alt="" loading="lazy" onerror="this.parentNode.innerHTML=' + JSON.stringify(SIL) + '; this.remove();"></div>';
}

function parseCategories(value) {
  return String(value || "")
    .split(/[,\n、]/)
    .map((item) => item.trim())
    .filter(Boolean);
}

function labelForLink(url) {
  if (!url) return "Web";
  if (url.includes("instagram")) return "Instagram";
  if (url.includes("facebook")) return "Facebook";
  if (url.includes("twitter") || url.includes("x.com")) return "X";
  if (url.includes("line.me") || url.includes("lin.ee")) return "LINE";
  if (url.includes("threads.net") || url.includes("threads.com")) return "Threads";
  if (url.includes("youtube")) return "YouTube";
  if (url.includes("note.com")) return "note";
  return "Web";
}

function buildMembers(rows) {
  const members = rows.map((row, index) => {
    const linkCandidates = [row[COL.sns1], row[COL.sns2], row[COL.url1], row[COL.url2]]
      .map(cleanUrl)
      .filter(Boolean);

    return {
      idx: index,
      nickname: row[COL.nickname] || "",
      name: row[COL.name] || "",
      job: row[COL.job] || "",
      photo: row[COL.photo] || "",
      emailPublic: row[COL.emailPublic] || "",
      emailForm: row[COL.emailForm] || "",
      license: row[COL.license] || "",
      skills: row[COL.skills] || "",
      goals: row[COL.goals] || "",
      comment: row[COL.comment] || "",
      cats: parseCategories(row[COL.cats]),
      otherGroups: "",
      otherGroupUrl1: row[COL.otherGroupUrl1] || "",
      otherGroup2: row[COL.otherGroup2] || "",
      otherGroupUrl2: row[COL.otherGroupUrl2] || "",
      groups: buildGroups(row),
      academyBatch: row[COL.academyBatch] || "",
      internalRole: row[COL.internalRole] || "",
      links: linkCandidates.map((url) => ({ label: labelForLink(url), url })),
    };
  });

  return members
    .map((member) => ({
      ...member,
      roleOrder: getRoleOrder(member.internalRole),
    }))
    .sort((a, b) => {
      if (a.roleOrder !== b.roleOrder) return a.roleOrder - b.roleOrder;
      return a.idx - b.idx;
    })
    .map((member, index) => ({
      ...member,
      idx: index,
    }));
}

function buildGroups(row) {
  return [
    { name: row[COL.otherGroups] || "", url: cleanUrl(row[COL.otherGroupUrl1] || "") },
    { name: row[COL.otherGroup2] || "", url: cleanUrl(row[COL.otherGroupUrl2] || "") },
  ].filter((group) => group.name);
}

function getRoleOrder(role) {
  const value = String(role || "").trim();
  if (!value) return 99;
  if (value.includes("副代表")) return 1;
  if (value.includes("代表") || value.includes("会計")) return 0;
  if (value.includes("監査")) return 2;
  return 50;
}

function bannerHTML(member) {
  const items = [];
  if (member.internalRole) {
    items.push(
      '<span class="member-banner member-banner--role">'
      + '<span class="member-banner__icon">■</span>'
      + '<span class="member-banner__label">役職</span>'
      + '<span>' + esc(member.internalRole) + '</span>'
      + '</span>'
    );
  }
  (member.groups || []).forEach((group) => {
    const inner = '<span class="member-banner__icon">□</span>'
      + '<span class="member-banner__label">所属団体</span>'
      + '<span>' + esc(group.name) + '</span>';
    items.push(group.url
      ? '<a class="member-banner member-banner--group" href="' + esc(group.url) + '" target="_blank" rel="noopener">' + inner + '</a>'
      : '<span class="member-banner member-banner--group">' + inner + '</span>'
    );
  });
  if (member.otherGroups) {
    items.push(
      '<span class="member-banner member-banner--group">'
      + '<span class="member-banner__icon">□</span>'
      + '<span class="member-banner__label">所属団体</span>'
      + '<span>' + esc(member.otherGroups) + '</span>'
      + '</span>'
    );
  }
  if (member.academyBatch) {
    items.push(
      '<span class="member-banner member-banner--academy">'
      + '<span class="member-banner__icon">□</span>'
      + '<span class="member-banner__label">市民アカデミー</span>'
      + '<span>' + esc(member.academyBatch) + '期</span>'
      + '</span>'
    );
  }
  return items.length ? '<div class="member-banners">' + items.join("") + '</div>' : "";
}

function cardHTML(member) {
  const tags = member.cats.map((cat) => {
    return '<span class="tag ' + (TAG_CLASS[cat] || "") + '">' + esc(cat) + '</span>';
  }).join("");

  const links = member.links.slice(0, 3).map((link) => {
    return '<a class="lbtn" href="' + esc(link.url) + '" target="_blank" rel="noopener">' + esc(link.label) + '</a>';
  }).join("");

  const subtitle = [member.name, member.job].filter(Boolean).join(" / ");
  const bio = member.skills || member.comment || member.goals || "";

  return ''
    + '<article class="card" data-idx="' + member.idx + '" tabindex="0" role="button">'
    + '<div class="card-top">'
    + avatarHTML(member.photo, "avatar")
    + '<div>'
    + '<div class="card-name">' + esc(member.nickname || "名前未設定") + '</div>'
    + (subtitle ? '<div class="card-sub">' + esc(subtitle) + '</div>' : "")
    + '</div>'
    + '</div>'
    + (tags ? '<div class="tags">' + tags + '</div>' : "")
    + bannerHTML(member)
    + (bio ? '<p class="card-bio">' + esc(bio) + '</p>' : "")
    + (links ? '<div class="card-links">' + links + '</div>' : "")
    + '</article>';
}

function sectionHTML(title, value) {
  if (!value) return "";
  return ''
    + '<section class="modal-section">'
    + '<h3 class="modal-section-title">' + esc(title) + '</h3>'
    + '<p class="modal-text">' + esc(value) + '</p>'
    + '</section>';
}

function modalHTML(member) {
  const tags = member.cats.map((cat) => {
    return '<span class="tag ' + (TAG_CLASS[cat] || "") + '">' + esc(cat) + '</span>';
  }).join("");

  const links = [];
  if (member.emailPublic) {
    links.push('<a href="mailto:' + esc(member.emailPublic) + '">メール</a>');
  }
  member.links.forEach((link) => {
    links.push('<a href="' + esc(link.url) + '" target="_blank" rel="noopener">' + esc(link.label) + '</a>');
  });

  const subtitle = [member.name, member.job].filter(Boolean).join(" / ");

  return ''
    + '<div class="modal-top">'
    + avatarHTML(member.photo, "modal-avatar")
    + '<div>'
    + '<div class="modal-name">' + esc(member.nickname || "名前未設定") + '</div>'
    + (subtitle ? '<div class="modal-sub">' + esc(subtitle) + '</div>' : "")
    + '</div>'
    + '</div>'
    + (tags ? '<div class="modal-tags">' + tags + '</div>' : "")
    + bannerHTML(member)
    + sectionHTML("できること・得意なこと", member.skills)
    + sectionHTML("保有資格", member.license)
    + sectionHTML("今後やりたいこと", member.goals)
    + sectionHTML("コメント", member.comment)
    + (links.length ? '<div class="modal-links">' + links.join("") + '</div>' : "");
}

function renderMembers(list) {
  const grid = document.getElementById("grid");
  if (!list.length) {
    grid.innerHTML = '<div class="empty">該当するメンバーが見つかりませんでした。</div>';
    return;
  }

  grid.innerHTML = list.map(cardHTML).join("");

  grid.querySelectorAll(".card").forEach((card) => {
    const index = Number(card.dataset.idx);
    card.addEventListener("click", () => openModal(index));
    card.addEventListener("keydown", (event) => {
      if (event.key === "Enter" || event.key === " ") {
        event.preventDefault();
        openModal(index);
      }
    });
  });

  grid.querySelectorAll(".card-links a").forEach((link) => {
    link.addEventListener("click", (event) => event.stopPropagation());
  });
}

function applyFilter() {
  const query = String(document.getElementById("search").value || "").toLowerCase();

  const filtered = allMembers.filter((member) => {
    const categoryMatched = activeCat === "all" || member.cats.includes(activeCat);
    const searchable = [
      member.nickname,
      member.name,
      member.job,
      member.skills,
      member.goals,
      member.comment,
      member.otherGroups,
      (member.groups || []).map((group) => group.name).join(" "),
      member.internalRole,
      member.academyBatch,
      member.cats.join(" "),
    ].join(" ").toLowerCase();

    return categoryMatched && (!query || searchable.includes(query));
  });

  document.getElementById("meta").textContent =
    allMembers.length + "人のメンバー中 " + filtered.length + "人を表示";

  renderMembers(filtered);
}

function openModal(index) {
  const member = allMembers.find((item) => item.idx === index);
  if (!member) return;
  document.getElementById("modal-content").innerHTML = modalHTML(member);
  document.getElementById("modal-bg").classList.add("open");
  document.body.style.overflow = "hidden";
}

function closeModal() {
  document.getElementById("modal-bg").classList.remove("open");
  document.body.style.overflow = "";
}

async function copyMailingList() {
  const password = window.prompt("パスワードを入力してください");
  if (password === null) return;
  if (password !== "cocola2026") {
    window.alert("パスワードが違います。");
    return;
  }

  const emails = [];
  allMembers.forEach((member) => {
    [member.emailPublic, member.emailForm].forEach((value) => {
      const email = String(value || "").trim();
      if (email) emails.push(email);
    });
  });

  const unique = [...new Set(emails)];
  if (!unique.length) {
    window.alert("コピーできるメールアドレスがありません。");
    return;
  }

  await navigator.clipboard.writeText(unique.join(", "));
  const toast = document.getElementById("mail-toast");
  toast.textContent = unique.length + "件のメールアドレスをコピーしました";
  toast.classList.add("show");
  window.setTimeout(() => toast.classList.remove("show"), 2600);
}

async function tryStaticJson() {
  const res = await fetch(STATIC_JSON_URL + "?ts=" + Date.now(), { credentials: "omit" });
  if (!res.ok) return null;
  const data = await res.json();
  if (!Array.isArray(data.rows) || !data._generatedMs) return null;
  if (Date.now() - data._generatedMs > STATIC_MAX_AGE_MS) return null;
  return data.rows;
}

async function loadMembers() {
  try {
    let rows = null;
    try { rows = await tryStaticJson(); } catch (_) {}
    if (!rows) {
      const res = await fetch(APP_URL + "?mode=json&ts=" + Date.now(), { credentials: "omit" });
      if (!res.ok) throw new Error("HTTP " + res.status);
      rows = await res.json();
    }
    allMembers = buildMembers(rows);
    applyFilter();
  } catch (error) {
    const banner = document.getElementById("err-banner");
    banner.style.display = "block";
    banner.textContent = "メンバー情報の読み込みに失敗しました。時間をおいて再読み込みしてください。(" + error.message + ")";
    document.getElementById("grid").innerHTML = '<div class="empty">データを読み込めませんでした。</div>';
    document.getElementById("meta").textContent = "読み込みエラー";
  }
}

function cleanUrl(value) {
  const url = String(value || "").trim();
  if (!url || !/^https?:\/\//.test(url)) return "";
  return url;
}

function esc(value) {
  return String(value || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

document.querySelectorAll(".chip").forEach((chip) => {
  chip.addEventListener("click", () => {
    document.querySelectorAll(".chip").forEach((item) => item.classList.remove("active"));
    chip.classList.add("active");
    activeCat = chip.dataset.cat;
    applyFilter();
  });
});

document.getElementById("search").addEventListener("input", applyFilter);
document.getElementById("mailBtn").addEventListener("click", copyMailingList);
document.getElementById("modal-close").addEventListener("click", closeModal);
document.getElementById("modal-bg").addEventListener("click", (event) => {
  if (event.target === document.getElementById("modal-bg")) closeModal();
});
document.addEventListener("keydown", (event) => {
  if (event.key === "Escape") closeModal();
});

loadMembers();
</script>
</body>
</html>
