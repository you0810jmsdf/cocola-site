<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>COCoLa DAO 提案と投票</title>
  <meta name="description" content="COCoLa DAOの提案一覧と投票状況を確認できるページです。">
  <meta name="theme-color" content="#1d8f6f">
  <link rel="icon" type="image/png" href="../assets/COCoLa_Logo_transparent.png">
  <style>
    :root {
      --ink: #1e2522;
      --muted: #66736e;
      --line: #d8e1dc;
      --paper: #ffffff;
      --wash: #f5f8f6;
      --green: #1d8f6f;
      --green-deep: #12634e;
      --coral: #d4544a;
      --yellow: #d5a628;
      --cyan: #2f7f9a;
      --shadow: 0 8px 24px rgba(29, 54, 45, 0.10);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      color: var(--ink);
      background: var(--wash);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 16px;
      line-height: 1.65;
      letter-spacing: 0;
    }

    a {
      color: inherit;
    }

    .site-header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 18px;
      background: var(--paper);
      border-bottom: 1px solid var(--line);
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--green-deep);
      text-decoration: none;
    }

    .back-link:hover {
      text-decoration: underline;
    }

    .header-title {
      margin: 0;
      font-size: 1rem;
      font-weight: 700;
      color: var(--ink);
    }

    .page {
      min-height: calc(100vh - 49px);
      padding: 28px 18px 48px;
    }

    .shell {
      width: min(1120px, 100%);
      margin: 0 auto;
    }

    .top {
      display: grid;
      grid-template-columns: minmax(0, 1.35fr) minmax(280px, 0.65fr);
      gap: 18px;
      align-items: stretch;
      margin-bottom: 18px;
    }

    .intro,
    .action-panel,
    .proposal-card,
    .empty {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .intro {
      padding: 24px;
      display: grid;
      align-content: center;
      gap: 14px;
    }

    .eyebrow {
      margin: 0;
      color: var(--green-deep);
      font-size: 0.86rem;
      font-weight: 700;
    }

    h1 {
      margin: 0;
      max-width: 780px;
      font-size: clamp(1.9rem, 1.35rem + 1.8vw, 3rem);
      line-height: 1.18;
      letter-spacing: 0;
    }

    .lead {
      margin: 0;
      max-width: 760px;
      color: var(--muted);
      font-size: 1.02rem;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }

    .stat {
      min-height: 72px;
      padding: 11px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfdfc;
    }

    .stat strong {
      display: block;
      font-size: 1.35rem;
      line-height: 1.25;
    }

    .stat span {
      display: block;
      color: var(--muted);
      font-size: 0.82rem;
    }

    .action-panel {
      padding: 20px;
      display: grid;
      gap: 12px;
      align-content: center;
    }

    .action-panel h2 {
      margin: 0;
      font-size: 1.15rem;
      line-height: 1.35;
    }

    .action-panel p {
      margin: 0;
      color: var(--muted);
      font-size: 0.94rem;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .button {
      display: inline-flex;
      min-height: 46px;
      align-items: center;
      justify-content: center;
      padding: 10px 14px;
      border-radius: 8px;
      border: 1px solid var(--green-deep);
      background: var(--green);
      color: #ffffff;
      font-weight: 700;
      text-decoration: none;
      text-align: center;
    }

    .button.secondary {
      background: #ffffff;
      color: var(--green-deep);
    }

    .button.is-disabled {
      pointer-events: none;
      border-color: var(--line);
      background: #e6ece9;
      color: #7f8b86;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      margin: 18px 0 12px;
      flex-wrap: wrap;
    }

    .toolbar h2 {
      margin: 0;
      font-size: 1.35rem;
      line-height: 1.3;
    }

    .filters {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .filter {
      min-height: 38px;
      padding: 7px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      color: var(--ink);
      font: inherit;
      font-size: 0.9rem;
      cursor: pointer;
    }

    .filter.is-active {
      border-color: var(--green);
      background: #e7f5f0;
      color: var(--green-deep);
      font-weight: 700;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .proposal-card {
      min-height: 360px;
      padding: 18px;
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      gap: 14px;
    }

    .card-head {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      justify-content: space-between;
    }

    .identity {
      min-width: 0;
    }

    .proposal-id {
      display: inline-block;
      margin-bottom: 5px;
      color: var(--muted);
      font-size: 0.8rem;
      font-weight: 700;
    }

    .proposal-title {
      margin: 0;
      overflow-wrap: anywhere;
      font-size: 1.28rem;
      line-height: 1.36;
      letter-spacing: 0;
    }

    .status {
      flex: 0 0 auto;
      max-width: 112px;
      padding: 5px 9px;
      border-radius: 8px;
      font-size: 0.8rem;
      font-weight: 700;
      text-align: center;
      color: #ffffff;
      background: var(--cyan);
    }

    .status.approved {
      background: var(--green);
    }

    .status.pending {
      background: var(--yellow);
      color: #2b2614;
    }

    .status.closed {
      background: var(--coral);
    }

    .meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 0.88rem;
    }

    .pill {
      padding: 4px 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfdfc;
    }

    .body-copy {
      display: grid;
      gap: 10px;
    }

    .copy-block {
      padding: 11px;
      border-radius: 8px;
      background: #f2f6f4;
      color: #34413c;
    }

    .copy-block strong {
      display: block;
      margin-bottom: 2px;
      color: var(--ink);
      font-size: 0.86rem;
    }

    .copy-block p {
      margin: 0;
      overflow-wrap: anywhere;
    }

    .vote-box {
      display: grid;
      gap: 9px;
    }

    .progress-track {
      height: 12px;
      overflow: hidden;
      border-radius: 8px;
      background: #e7eeeb;
    }

    .progress-bar {
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, var(--green), var(--cyan));
      transition: width 240ms ease;
    }

    .vote-numbers {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 6px;
      font-size: 0.82rem;
      color: var(--muted);
    }

    .vote-numbers span {
      min-height: 42px;
      padding: 6px;
      border-radius: 8px;
      background: #f5f8f6;
    }

    .vote-numbers b {
      display: block;
      color: var(--ink);
      font-size: 0.96rem;
    }

    .empty {
      padding: 28px;
      text-align: center;
      color: var(--muted);
    }

    .updated {
      margin-top: 14px;
      color: var(--muted);
      font-size: 0.82rem;
      text-align: right;
    }

    @media (max-width: 820px) {
      .page {
        padding: 16px 12px 32px;
      }

      .top,
      .grid {
        grid-template-columns: 1fr;
      }

      .stats {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .toolbar {
        align-items: stretch;
      }

      .filters {
        width: 100%;
      }

      .filter {
        flex: 1 1 132px;
      }
    }

    @media (max-width: 520px) {
      .intro,
      .action-panel,
      .proposal-card {
        padding: 15px;
      }

      .stats,
      .vote-numbers {
        grid-template-columns: 1fr;
      }

      .card-head {
        display: grid;
      }

      .status {
        max-width: none;
        justify-self: start;
      }
    }

    /* 取消ボタン */
    .cancel-btn {
      display: inline-flex;
      align-items: center;
      min-height: 32px;
      padding: 4px 10px;
      border: 1px solid var(--coral);
      border-radius: 6px;
      background: #fff;
      color: var(--coral);
      font: inherit;
      font-size: 0.82rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 120ms;
    }
    .cancel-btn:hover {
      background: #fdf1f0;
    }

    /* モーダルオーバーレイ */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(30, 37, 34, 0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 16px;
    }
    .modal-overlay[hidden] {
      display: none;
    }
    .modal-box {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 10px;
      box-shadow: 0 12px 40px rgba(29, 54, 45, 0.18);
      padding: 24px;
      width: min(420px, 100%);
      display: grid;
      gap: 14px;
    }
    .modal-box h3 {
      margin: 0;
      font-size: 1.1rem;
      color: var(--coral);
    }
    .modal-box p {
      margin: 0;
      font-size: 0.95rem;
      color: var(--muted);
    }
    .modal-box strong {
      color: var(--ink);
    }
    .modal-field label {
      display: block;
      font-size: 0.86rem;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .modal-field input {
      width: 100%;
      min-height: 42px;
      padding: 8px 12px;
      border: 1px solid var(--line);
      border-radius: 6px;
      font: inherit;
      font-size: 1rem;
      background: var(--wash);
      color: var(--ink);
    }
    .modal-field input:focus {
      outline: 2px solid var(--green);
      outline-offset: 1px;
      background: #fff;
    }
    .modal-actions {
      display: flex;
      gap: 10px;
    }
    .btn-danger {
      flex: 1;
      min-height: 42px;
      padding: 8px 14px;
      border: 1px solid var(--coral);
      border-radius: 6px;
      background: var(--coral);
      color: #fff;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }
    .btn-danger:disabled {
      opacity: 0.6;
      cursor: default;
    }
    .btn-neutral {
      min-height: 42px;
      padding: 8px 14px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      font: inherit;
      cursor: pointer;
    }
    .modal-error {
      min-height: 1.4em;
      font-size: 0.88rem;
      color: var(--coral);
    }
  </style>
</head>
<body>
  <header class="site-header">
    <a class="back-link" href="../">&#8592; COCoLa トップへ</a>
    <h1 class="header-title">DAO 提案と投票</h1>
  </header>

  <main class="page">
    <div class="shell">
      <section class="top" aria-label="提案と投票">
        <div class="intro">
          <p class="eyebrow">COCoLa DAO</p>
          <h1>やりたいことを出し合い、投票で次の動きを決める。</h1>
          <p class="lead">提案は公開後に投票できます。賛成の重みが有効投票権重みの過半数を超えると、承認として扱います。</p>
          <div class="stats" id="stats"></div>
        </div>

        <aside class="action-panel" aria-label="フォーム">
          <h2>提案・投票フォーム</h2>
          <p>提案者には3pt、承認された提案には追加で5ptが入ります。</p>
          <div class="actions">
            <a class="button" id="proposalForm" href="#" target="_blank" rel="noopener">提案する</a>
            <a class="button secondary" id="voteForm" href="#" target="_blank" rel="noopener">投票する</a>
          </div>
        </aside>
      </section>

      <section aria-label="提案一覧">
        <div class="toolbar">
          <h2>提案一覧</h2>
          <div class="filters" role="list" aria-label="絞り込み">
            <button class="filter is-active" type="button" data-filter="all">すべて</button>
            <button class="filter" type="button" data-filter="voting">投票中</button>
            <button class="filter" type="button" data-filter="approved">承認</button>
          </div>
        </div>
        <div class="grid" id="proposalGrid"></div>
        <div class="empty" id="empty" hidden>公開中の提案はまだありません。</div>
      </section>

      <p class="updated" id="updated"></p>
    </div>
  </main>

  <!-- 取消確認モーダル -->
  <div class="modal-overlay" id="cancelModal" hidden role="dialog" aria-modal="true" aria-labelledby="cancelModalTitle">
    <div class="modal-box">
      <h3>提案を取り消す</h3>
      <p><strong id="cancelModalTitle"></strong> を「終了」に変更します。この操作はスプレッドシートに直接書き込みます。</p>
      <div class="modal-field">
        <label for="cancelPwInput">管理者パスワード</label>
        <input type="password" id="cancelPwInput" autocomplete="off" placeholder="パスワードを入力">
      </div>
      <p class="modal-error" id="cancelError" aria-live="polite"></p>
      <div class="modal-actions">
        <button class="btn-danger" id="cancelConfirmBtn" type="button">取り消す</button>
        <button class="btn-neutral" id="cancelAbortBtn" type="button">キャンセル</button>
      </div>
    </div>
  </div>

  <script>
    // ★ GAS WebアプリのデプロイURLをここに設定してください
    // GASエディタ → デプロイ → デプロイを管理 → ウェブアプリのURL (exec で終わるURL)
    var GAS_URL = 'https://script.google.com/macros/s/AKfycbwDzs2IbPgVaDEFhlnnFdC7DJS6MKo_wMLZGHDAcyMkG1SwR4NrpW5ex6dON1UZQBPP/exec';

    var state = {
      filter: 'all',
      data: { stats: {}, proposals: [], eligibleWeight: 0 },
    };

    var grid = document.getElementById('proposalGrid');
    var empty = document.getElementById('empty');
    var stats = document.getElementById('stats');
    var updated = document.getElementById('updated');
    var proposalForm = document.getElementById('proposalForm');
    var voteForm = document.getElementById('voteForm');

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function numberText(value, suffix) {
      var number = Number(value) || 0;
      return (Math.round(number * 10) / 10) + (suffix || '');
    }

    function setFormLink(element, url) {
      if (!url) {
        element.classList.add('is-disabled');
        element.removeAttribute('href');
        element.setAttribute('aria-disabled', 'true');
        return;
      }
      element.href = url;
      element.classList.remove('is-disabled');
      element.removeAttribute('aria-disabled');
    }

    function renderStats() {
      var s = state.data.stats || {};
      var items = [
        ['公開提案', s.proposals || 0],
        ['投票中', s.voting || 0],
        ['承認', s.approved || 0],
        ['投票数', s.votes || 0],
      ];
      stats.innerHTML = items.map(function(item) {
        return '<div class="stat"><strong>' + escapeHtml(item[1]) + '</strong><span>' + escapeHtml(item[0]) + '</span></div>';
      }).join('');
    }

    function statusClass(statusKey) {
      if (statusKey === 'approved') return 'approved';
      if (statusKey === 'pending') return 'pending';
      if (statusKey === 'closed') return 'closed';
      return '';
    }

    function renderProposal(proposal) {
      var detail = proposal.detail || '詳細はこれから追記されます。';
      var needs = proposal.needs || '必要になったものから相談します。';
      var eligible = proposal.eligibleWeight || state.data.eligibleWeight || 0;
      var cancelable = proposal.statusKey !== 'closed';
      var cancelBtn = cancelable
        ? '<button class="cancel-btn" type="button" data-cancel-id="' + escapeHtml(proposal.id) + '" data-cancel-title="' + escapeHtml(proposal.title) + '">取消</button>'
        : '';
      return '<article class="proposal-card" data-status="' + escapeHtml(proposal.statusKey) + '">' +
        '<div class="card-head">' +
          '<div class="identity">' +
            '<span class="proposal-id">' + escapeHtml(proposal.id) + '</span>' +
            '<h3 class="proposal-title">' + escapeHtml(proposal.title) + '</h3>' +
          '</div>' +
          '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0">' +
            '<span class="status ' + statusClass(proposal.statusKey) + '">' + escapeHtml(proposal.status) + '</span>' +
            cancelBtn +
          '</div>' +
        '</div>' +
        '<div class="meta">' +
          '<span class="pill">' + escapeHtml(proposal.category) + '</span>' +
          '<span class="pill">提案者: ' + escapeHtml(proposal.proposer) + '</span>' +
          (proposal.submittedAt ? '<span class="pill">' + escapeHtml(proposal.submittedAt) + '</span>' : '') +
        '</div>' +
        '<div class="body-copy">' +
          '<div class="copy-block"><strong>理由・詳細</strong><p>' + escapeHtml(detail) + '</p></div>' +
          '<div class="copy-block"><strong>必要なもの</strong><p>' + escapeHtml(needs) + '</p></div>' +
        '</div>' +
        '<div class="vote-box" aria-label="投票状況">' +
          '<div class="progress-track" aria-hidden="true">' +
            '<div class="progress-bar" style="width: ' + escapeHtml(proposal.progressPercent) + '%"></div>' +
          '</div>' +
          '<div class="vote-numbers">' +
            '<span><b>' + numberText(proposal.yesRate, '%') + '</b>賛成率</span>' +
            '<span><b>' + numberText(proposal.yesWeight) + '</b>賛成重み</span>' +
            '<span><b>' + numberText(proposal.noWeight) + '</b>反対重み</span>' +
            '<span><b>' + numberText(eligible) + '</b>母数</span>' +
          '</div>' +
        '</div>' +
        '</article>';
    }

    function renderProposals() {
      var proposals = state.data.proposals || [];
      var visible = proposals.filter(function(p) { return state.filter === 'all' || p.statusKey === state.filter; });
      grid.innerHTML = visible.map(renderProposal).join('');
      empty.hidden = visible.length > 0;
      updated.textContent = state.data.generatedAt ? '更新: ' + state.data.generatedAt : '';
    }

    function bindFilters() {
      document.querySelectorAll('.filter').forEach(function(button) {
        button.addEventListener('click', function() {
          state.filter = button.dataset.filter;
          document.querySelectorAll('.filter').forEach(function(item) {
            item.classList.toggle('is-active', item === button);
          });
          renderProposals();
        });
      });
    }

    renderStats();
    renderProposals();
    bindFilters();

    // --- 取消モーダル ---
    var cancelModal = document.getElementById('cancelModal');
    var cancelModalTitle = document.getElementById('cancelModalTitle');
    var cancelPwInput = document.getElementById('cancelPwInput');
    var cancelError = document.getElementById('cancelError');
    var cancelConfirmBtn = document.getElementById('cancelConfirmBtn');
    var cancelAbortBtn = document.getElementById('cancelAbortBtn');
    var pendingCancelId = null;

    grid.addEventListener('click', function(e) {
      var btn = e.target.closest('[data-cancel-id]');
      if (!btn) return;
      pendingCancelId = btn.dataset.cancelId;
      cancelModalTitle.textContent = btn.dataset.cancelTitle;
      cancelPwInput.value = '';
      cancelError.textContent = '';
      cancelModal.hidden = false;
      cancelPwInput.focus();
    });

    cancelAbortBtn.addEventListener('click', function() {
      cancelModal.hidden = true;
      pendingCancelId = null;
    });

    cancelModal.addEventListener('click', function(e) {
      if (e.target === cancelModal) {
        cancelModal.hidden = true;
        pendingCancelId = null;
      }
    });

    cancelConfirmBtn.addEventListener('click', function() {
      if (!pendingCancelId) return;
      var pw = cancelPwInput.value;
      if (!pw) { cancelError.textContent = 'パスワードを入力してください'; return; }
      cancelConfirmBtn.disabled = true;
      cancelError.textContent = '';
      fetch(GAS_URL + '?mode=cancel&id=' + encodeURIComponent(pendingCancelId) + '&pw=' + encodeURIComponent(pw))
        .then(function(r) { return r.ok ? r.json() : Promise.reject(new Error('通信エラー')); })
        .then(function(result) {
          cancelConfirmBtn.disabled = false;
          if (result.ok) {
            cancelModal.hidden = true;
            pendingCancelId = null;
            return fetch(GAS_URL + '?mode=json')
              .then(function(r) { return r.ok ? r.json() : Promise.reject(); })
              .then(function(data) {
                state.data = data;
                renderStats();
                renderProposals();
              });
          } else {
            cancelError.textContent = result.error || '取り消しに失敗しました';
          }
        })
        .catch(function(err) {
          cancelConfirmBtn.disabled = false;
          cancelError.textContent = (err && err.message) ? err.message : '通信エラーが発生しました';
        });
    });

    fetch(GAS_URL + '?mode=json')
      .then(function(response) { return response.ok ? response.json() : Promise.reject(new Error('load failed')); })
      .then(function(data) {
        state.data = data;
        setFormLink(proposalForm, data.proposalFormUrl);
        setFormLink(voteForm, data.voteFormUrl);
        renderStats();
        renderProposals();
      })
      .catch(function() {
        empty.hidden = false;
        empty.textContent = '提案データの読み込みに時間がかかっています。少し待ってから再読み込みしてください。';
      });
  </script>
</body>
</html>
