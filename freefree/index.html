    <span class="modal-close" onclick="closeModal()">×</span>
    <div id="modal-body"></div>
  </div>
</div>

<?!= include('script') ?>
<script>
let allPosters = [];
let allBusinesses = [];
let currentCategory = 'all';
let currentBizCategory = 'all';
let categories = [];

window.addEventListener('load', () => {
  categories = <?!= categoriesJson ?>;
  renderTabs();
  loadPosters();
  logEvent('page_view', '');

  document.getElementById('modal').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeModal();
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
  });
});

function renderTabs() {
  const tabs = document.getElementById('tabs');
  const items = [
    { key: 'all', label: 'すべて' },
    { key: 'event', label: '📢 イベント告知' },
    ...categories.map(c => ({ key: c, label: c })),
    { key: 'businesses', label: '🏪 事業者' }
  ];
  tabs.innerHTML = items.map(i =>
    `<div class="tab ${i.key === currentCategory ? 'active' : ''}" onclick="selectTab('${i.key}')">${i.label}</div>`
  ).join('');
}

function selectTab(key) {
  currentCategory = key;
  renderTabs();
  if (key === 'businesses') {
    document.getElementById('poster-grid').style.display = 'none';
    document.getElementById('business-list').style.display = '';
    loadBusinesses();
  } else {
    document.getElementById('poster-grid').style.display = '';
    document.getElementById('business-list').style.display = 'none';
    renderPosters();
  }
}

function loadPosters() {
  const url = '<?= webAppUrl ?>?page=api';
  fetch(url)
    .then(r => r.json())
    .then(data => { allPosters = data.posters || []; renderPosters(); })
    .catch(() => {
      document.getElementById('poster-grid').innerHTML =
        '<div class="empty">ポスターの読み込みに失敗しました。再読み込みしてください。</div>';
    });
}

function renderPosters() {
  const grid = document.getElementById('poster-grid');
  let list = allPosters;
  if (currentCategory === 'event') {
    list = list.filter(p => p.poster_type === 'イベント');
  } else if (currentCategory !== 'all') {
    list = list.filter(p => p.category === currentCategory);
  }
  if (list.length === 0) {
    grid.innerHTML = '<div class="empty">掲載中のポスターはありません</div>';
    return;
  }
  grid.innerHTML = list.map(p => `
    <div class="poster-card" onclick="openDetail('${p.poster_id}')">
      <div class="poster-img-wrap">
        <img src="${p.image_url}" alt="${escapeHtml(p.title)}" loading="lazy" onerror="this.style.background='#ddd';this.src=''">
      </div>
      <div class="poster-info">
        <div>
          ${p.poster_type === 'イベント' ? '<span class="badge event">イベント</span>' : ''}
          ${p.category ? `<span class="badge">${escapeHtml(p.category)}</span>` : ''}
        </div>
        <h3>${escapeHtml(p.business.business_name)}</h3>
        <div class="meta">${escapeHtml(p.business.area)}${p.business.address ? ' / ' + escapeHtml(p.business.address) : ''}</div>
        ${p.comment ? `<div class="poster-comment">${linkify(p.comment)}</div>` : ''}
        <div class="pr">${escapeHtml(truncate(p.business.pr_text, 60))}</div>
      </div>
    </div>
  `).join('');
}

function openDetail(posterId) {
  const p = allPosters.find(x => x.poster_id === posterId);
  if (!p) return;
  logEvent('detail_click', posterId);
  const b = p.business;
  const contacts = [];
  (b.contact_method || []).forEach(m => {
    if (m === 'メール' && b.email) contacts.push(`<a href="mailto:${b.email}" onclick="logEvent('contact_click','${posterId}')">✉️ メール</a>`);
    if (m === '電話' && b.phone) contacts.push(`<a href="tel:${b.phone}" onclick="logEvent('contact_click','${posterId}')">📞 電話</a>`);
    if (m === 'LINE公式' && b.line_url) contacts.push(`<a href="${b.line_url}" target="_blank" onclick="logEvent('contact_click','${posterId}')">LINE</a>`);
    if (m === '自社サイト/SNS URL') {
      if (b.website_url) contacts.push(`<a class="sub" href="${b.website_url}" target="_blank" onclick="logEvent('website_click','${posterId}')">🌐 サイト</a>`);
      if (b.sns_url) contacts.push(`<a class="sub" href="${b.sns_url}" target="_blank" onclick="logEvent('website_click','${posterId}')">📱 SNS</a>`);
    }
  });

  document.getElementById('modal-body').innerHTML = `
    <h2>${escapeHtml(b.business_name)}</h2>
    <div style="margin-bottom:12px">
      ${p.poster_type === 'イベント' ? '<span class="badge event">イベント</span>' : ''}
      ${p.category ? `<span class="badge">${escapeHtml(p.category)}</span>` : ''}
    </div>
    <img src="${p.image_url}" style="width:100%;border-radius:8px;margin-bottom:12px">
    <h3 style="margin:8px 0">${escapeHtml(p.title)}</h3>
    ${p.comment ? `<div class="poster-comment modal">${linkify(p.comment)}</div>` : ''}
    <p style="white-space:pre-wrap;word-break:break-word">${linkify(b.pr_text)}</p>
    <div style="font-size:13px;color:#666;margin:12px 0">
      ${b.address ? '📍 ' + escapeHtml(b.address) + '<br>' : ''}
      ${b.area ? 'エリア: ' + escapeHtml(b.area) + '<br>' : ''}
      ${p.poster_type === 'イベント' ? '開催期間: ' + p.start_date + ' 〜 ' + p.end_date : ''}
    </div>
    <div class="contact-row">${contacts.join('')}</div>
  `;
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

function loadBusinesses() {
  const el = document.getElementById('business-list');
  if (allBusinesses.length > 0) { renderBusinessList(); return; }
  el.innerHTML = '<div class="loading">読み込み中...</div>';
  fetch('<?= webAppUrl ?>?page=api&type=businesses')
    .then(r => r.json())
    .then(data => { allBusinesses = data.businesses || []; renderBusinessList(); })
    .catch(() => { el.innerHTML = '<div class="empty">読み込みに失敗しました</div>'; });
}

function selectBizCategory(cat) {
  currentBizCategory = cat;
  renderBusinessList();
}

function renderBusinessList() {
  const el = document.getElementById('business-list');
  if (allBusinesses.length === 0) {
    el.innerHTML = '<div class="empty">登録事業者はまだいません</div>';
    return;
  }
  const cats = [...new Set(allBusinesses.map(b => b.category || 'その他'))];
  const filtered = currentBizCategory === 'all'
    ? allBusinesses
    : allBusinesses.filter(b => (b.category || 'その他') === currentBizCategory);

  const pills = ['all', ...cats].map(c => {
    const label = c === 'all' ? 'すべて' : c;
    const active = c === currentBizCategory ? 'active' : '';
    return `<button class="tab ${active}" onclick="selectBizCategory('${escapeHtml(c)}')">${escapeHtml(label)}</button>`;
  }).join('');

  const grouped = {};
  filtered.forEach(b => {
    const cat = b.category || 'その他';
    if (!grouped[cat]) grouped[cat] = [];
    grouped[cat].push(b);
  });
  const listHtml = currentBizCategory !== 'all'
    ? `<div class="biz-list">${filtered.map(b => renderBizCard(b)).join('')}</div>`
    : Object.entries(grouped).map(([cat, list]) => `
        <div class="biz-group">
          <h3 class="biz-cat-title">${escapeHtml(cat)}</h3>
          <div class="biz-list">${list.map(b => renderBizCard(b)).join('')}</div>
        </div>
      `).join('');

  el.innerHTML = `<div class="tabs" style="margin-bottom:16px">${pills}</div>${listHtml}`;
}

function renderBizCard(b) {
  const contacts = [];
  (b.contact_method || []).forEach(m => {
    if (m === 'メール' && b.email) contacts.push(`<a href="mailto:${b.email}">✉️ メール</a>`);
    if (m === '電話' && b.phone) contacts.push(`<span>📞 ${escapeHtml(b.phone)}</span>`);
    if (m === 'LINE公式' && b.line_url) contacts.push(`<a href="${b.line_url}" target="_blank" rel="noopener">LINE</a>`);
    if (m === '自社サイト/SNS URL') {
      if (b.website_url) contacts.push(`<a href="${b.website_url}" target="_blank" rel="noopener">🌐 サイト</a>`);
      if (b.sns_url) contacts.push(`<a href="${b.sns_url}" target="_blank" rel="noopener">📱 SNS</a>`);
    }
  });
  return `
    <div class="biz-card">
      <div class="biz-name">${escapeHtml(b.business_name)}${b.entity_type === '団体' ? ' <span class="badge">団体</span>' : ''}</div>
      <div class="biz-meta">${b.area ? escapeHtml(b.area) : ''}${b.address ? ' / ' + escapeHtml(b.address) : ''}</div>
      ${b.pr_text ? `<div class="biz-pr">${escapeHtml(truncate(b.pr_text, 80))}</div>` : ''}
      ${contacts.length ? `<div class="contact-row">${contacts.join('')}</div>` : ''}
    </div>
  `;
}

function escapeHtml(s) {
  if (s === null || s === undefined) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function truncate(s, n) { s = s || ''; return s.length > n ? s.slice(0, n) + '…' : s; }
function linkify(s) {
  return escapeHtml(s).replace(/(https?:\/\/[^\s<>"']+)/g,
    '<a href="$1" target="_blank" rel="noopener">$1</a>');
}
</script>
